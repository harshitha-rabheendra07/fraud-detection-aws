apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-uat
  namespace: uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-detection-uat
  template:
    metadata:
      labels:
        app: fraud-detection-uat
    spec:
      containers:
      - name: fraud-app
        image: 968603941077.dkr.ecr.ap-south-1.amazonaws.com/fraud-detection:latest
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-uat-service
  namespace: uat
spec:
  selector:
    app: fraud-detection-uat
  ports:
  - port: 8501
    targetPort: 8501
  type: LoadBalancer
